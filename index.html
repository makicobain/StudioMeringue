  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grad: linear-gradient(90deg, #2D1B6B 0%, #C41B6E 50%, #F5720A 100%);
  }

  body {
    min-height: 100vh;
    background: #FFFFFF;
    font-family: 'Grifter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }

  main {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 620px;
    width: 100%;
  }

  .logo-wrap {
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
  }

  .logo-wrap img {
    width: 220px;
    height: auto;
  }

  .headline {
    font-family: 'Grifter', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 700;
    line-height: 0.95;
    color: #0D0D0D;
    letter-spacing: -0.03em;
    text-transform: lowercase;
    margin-bottom: 0.6rem;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
  }

  .grad-bar {
    width: 100%;
    height: 5px;
    background: var(--grad);
    margin: 1.4rem auto;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
  }

  .sub {
    font-family: 'Grifter', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0D0D0D;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 3.5rem;
    padding: 10px 22px;
    border: 1.5px solid #0D0D0D;
    font-family: 'Grifter', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #0D0D0D;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C41B6E, #F5720A);
    animation: pulse 2s ease-in-out infinite;
  }

  .contact {
    margin-top: 2rem;
    font-family: 'Grifter', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.85s forwards;
  }

  .contact a {
    color: #0D0D0D;
    text-decoration: none;
    background-image: var(--grad);
    background-size: 100% 1.5px;
    background-position: 0 100%;
    background-repeat: no-repeat;
    padding-bottom: 2px;
    transition: background-size 0.25s, color 0.25s, padding 0.25s;
  }

  .contact a:hover {
    background-size: 100% 100%;
    color: #fff;
    padding: 1px 4px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1; transform: scale(1.4); }
  }
</style>
</head>
